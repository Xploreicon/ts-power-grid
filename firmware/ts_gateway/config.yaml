# T&S Gateway Hub — default config.
#
# Copy to /etc/ts-gateway/config.yaml and edit site_id + cert paths
# during provisioning. Values here are the defaults applied by
# config.load() when a key is missing.

# Unique site identifier — must match the CN of the client cert.
# The MQTT broker's ACL denies any mismatch.
site_id: "00000000-0000-0000-0000-000000000000"

mqtt:
  host: "639f4ba970674c47b69fac1be5b7181f.s1.eu.hivemq.cloud"
  port: 8883
  # TLS material. Empty (the default for HiveMQ Cloud) → use the system
  # CA bundle and authenticate via MQTT_USERNAME / MQTT_PASSWORD env
  # vars. For an EMQX-style mTLS broker, set all three paths and drop
  # the env credentials.
  ca_cert: ""
  client_cert: ""
  client_key: ""
  # Credentials are NOT in this file. config.load() reads them from the
  # MQTT_USERNAME / MQTT_PASSWORD environment variables so secrets
  # never land in git. The systemd unit at install time gets them via
  # /etc/ts-gateway/credentials (see install.sh).
  keepalive_sec: 60
  # Last-will published retained when the socket drops uncleanly — the
  # backend picks this up as an offline signal within the keepalive window.
  will_topic_suffix: "gateway/heartbeat"

intervals:
  meter_poll_sec: 30        # bus read cadence per meter
  meter_stagger_sec: 2      # delay between meters on same bus
  heartbeat_sec: 300        # 5 min
  health_alert_sec: 60      # internal health tick

offline_queue:
  # Leave null for local dev — LocalQueue writes to firmware/data/queue.db
  # next to the package. Production Pi installs override to
  # /var/lib/ts-gateway/queue.db (see install.sh + the systemd unit's
  # ReadWritePaths).
  db_path: null
  max_age_hours: 72         # drop readings older than this on drain
  drain_batch: 100          # messages per drain cycle

modbus:
  port: "/dev/ttyUSB0"      # PZEM-004T USB-TTL adapter
  baudrate: 9600            # PZEM-004T v3.0 default
  parity: "N"               # PZEM-004T is 8N1
  stopbits: 1
  bytesize: 8
  timeout_sec: 2

# BCM pin numbers for the 2-channel relay module's channel inputs.
# Each meter's `relay_pin` must reference one of these. Empty list =
# no relay hardware (Hexing-on-board-relay sites, dev laptops).
relay_pins: [17, 27]

# Meter roster. `driver` picks a class from ts_gateway.meters.
# `id` is the UUID registered in Supabase. Kept static per site.
#
# Default driver is `pzem004t` (the rev we're shipping in 2026-Q2).
# Swap to `simulator` for `--dry-run` on a laptop without pymodbus or
# an RS-485 adapter; swap to `hexing_hxe110` for legacy retrofit sites
# that already have a Hexing meter installed.
meters:
  - id: "00000000-0000-0000-0000-000000000001"
    driver: "pzem004t"
    modbus_address: 1       # PZEM ships at slave address 0x01
    relay_pin: 17           # contactor wired to GPIO17 (BCM)
    role: "host"            # host | neighbor
  # Second-circuit example:
  # - id: "..."
  #   driver: "pzem004t"
  #   modbus_address: 2
  #   relay_pin: 27
  #   role: "neighbor"

thresholds:
  cpu_temp_c: 80
  disk_used_pct: 90
  mem_used_pct: 90

logging:
  level: "INFO"             # DEBUG | INFO | WARNING | ERROR
