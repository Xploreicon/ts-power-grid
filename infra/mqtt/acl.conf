%% EMQX ACL rules for T&S Power Grid.
%%
%% Identity: the mTLS client certificate's Common Name (CN) is the
%% gateway's site_id (UUID). EMQX exposes it as ${cert_common_name}.
%%
%% Principle of least privilege:
%%   - A gateway can PUBLISH only to its own site's telemetry/heartbeat/events.
%%   - A gateway can SUBSCRIBE only to its own site's commands.
%%   - The backend service (CN=ts-backend) has full publish/subscribe on ts/#.
%%   - Everything else is denied (global default = deny).

%% Backend service — full access.
{allow, {username, "ts-backend"}, all, ["ts/#"]}.

%% Gateway publish rules — site_id must equal the cert CN.
{allow, all, publish, ["ts/sites/${cert_common_name}/meters/+/telemetry"]}.
{allow, all, publish, ["ts/sites/${cert_common_name}/gateway/heartbeat"]}.
{allow, all, publish, ["ts/sites/${cert_common_name}/events"]}.

%% Gateway subscribe rules.
{allow, all, subscribe, ["ts/sites/${cert_common_name}/commands"]}.

%% Default deny (explicit — EMQX also has authorization.no_match=deny).
{deny, all}.
